services:
  dynamodb:
    image: amazon/dynamodb-local
    container_name: kua-dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /data"
    networks:
      - backend-net

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin
    container_name: kua-admindb
    ports:
      - 8001:8001
    environment:
      DYNAMO_ENDPOINT: http://dynamodb:8000
      AWS_REGION: us-east-1
    depends_on:
      - dynamodb
    networks:
      - backend-net

networks:
  backend-net:
